<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Amsterdam Vibes Check</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FDFCF9; -webkit-font-smoothing: antialiased; }
  button { -webkit-tap-highlight-color: transparent; }
  input { outline: none; }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState } = React;

const QS = [
  { id: "weather", q: "It's probably going to rain. How do you feel?", opts: [
    { label: "🏛 Get me indoors", val: "indoor" },
    { label: "🌧 I'll survive, just plan around it", val: "flex" },
    { label: "☔ Don't care, I have a coat", val: "outdoor" },
  ]},
  { id: "energy", q: "How much walking energy do you have tomorrow?", opts: [
    { label: "🦥 Less than today please", val: "low" },
    { label: "🚶 About the same", val: "med" },
    { label: "⚡ I'm good, let's go", val: "high" },
  ]},
  { id: "vibe", q: "What sounds most appealing?", opts: [
    { label: "⛴ Ferry to the industrial north — street art, warehouses, different Amsterdam", val: "noord" },
    { label: "🔬 Science museum + waterfront — compact, interesting, easy", val: "nemo" },
    { label: "🌍 World cultures museum + windmill brewery + French bistro", val: "oost" },
    { label: "🛒 Market neighbourhood + Surinamese food + grazing", val: "pijp" },
  ]},
  { id: "food", q: "Lunch — what's your vibe?", opts: [
    { label: "🍽 Sit down properly somewhere good", val: "sit" },
    { label: "🥙 Graze — a few small things from different places", val: "graze" },
    { label: "🍕 One really good thing, then snacks", val: "one" },
  ]},
  { id: "veggie", q: "Food preferences?", opts: [
    { label: "🌱 Vegetarian — I need proper options", val: "veg" },
    { label: "🐟 I eat everything", val: "omni" },
    { label: "🧀 Mostly veggie but flexible", val: "flexveg" },
  ]},
  { id: "pace", q: "How do you want the day to feel?", opts: [
    { label: "📋 A few things planned, then see how it goes", val: "loose" },
    { label: "🗺 Have a clear route, hit some highlights", val: "planned" },
    { label: "☕ Honestly just good coffee, a museum and lunch", val: "chill" },
  ]},
];

const ENCODE_MAP = {
  weather: { indoor: "A", flex: "B", outdoor: "C" },
  energy: { low: "D", med: "E", high: "F" },
  vibe: { noord: "G", nemo: "H", oost: "J", pijp: "K" },
  food: { sit: "L", graze: "M", one: "N" },
  veggie: { veg: "P", omni: "Q", flexveg: "R" },
  pace: { loose: "S", planned: "T", chill: "U" },
};

const DECODE_MAP = {};
Object.entries(ENCODE_MAP).forEach(([qid, map]) => {
  Object.entries(map).forEach(([val, code]) => {
    DECODE_MAP[code] = { qid, val };
  });
});

function encode(answers) {
  return QS.map(q => ENCODE_MAP[q.id]?.[answers[q.id]] || "?").join("");
}

function decode(code) {
  const answers = {};
  code.split("").forEach(ch => {
    const d = DECODE_MAP[ch];
    if (d) answers[d.qid] = d.val;
  });
  return answers;
}

const LABELS = {
  weather: { indoor: "Indoors please", flex: "Flexible", outdoor: "Don't care" },
  energy: { low: "Low energy", med: "Medium", high: "Let's go" },
  vibe: { noord: "Noord (ferry + street art)", nemo: "NEMO (science + waterfront)", oost: "Oost (Tropenmuseum + brewery)", pijp: "De Pijp (market + food)" },
  food: { sit: "Sit-down lunch", graze: "Graze around", one: "One thing + snacks" },
  veggie: { veg: "Vegetarian", omni: "Eat everything", flexveg: "Mostly veggie" },
  pace: { loose: "Loose plan", planned: "Clear route", chill: "Keep it simple" },
};

function Quiz() {
  const [mode, setMode] = useState("pick"); // pick | quiz | result | decode
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [codes, setCodes] = useState(["", "", "", ""]);
  const [names, setNames] = useState(["Person 1", "Person 2", "Person 3", "Person 4"]);

  const handleAnswer = (val) => {
    const newA = { ...answers, [QS[step].id]: val };
    setAnswers(newA);
    if (step < QS.length - 1) {
      setTimeout(() => setStep(step + 1), 200);
    } else {
      setTimeout(() => setMode("result"), 300);
    }
  };

  const myCode = encode(answers);
  const decoded = codes.map(c => c.length === 6 ? decode(c) : null).filter(Boolean);

  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif", background: "#FDFCF9", minHeight: "100vh", color: "#1A1A1A", maxWidth: 480, margin: "0 auto" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

      <div style={{ position: "sticky", top: 0, zIndex: 100, background: "#1A1A1A", color: "#fff", padding: "12px 18px" }}>
        <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 9.5, fontWeight: 700, letterSpacing: "0.1em", opacity: 0.45 }}>WEDNESDAY · AMSTERDAM DAY 2</div>
        <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 14, fontWeight: 700, marginTop: 1 }}>GROUP VIBES CHECK</div>
      </div>

      <div style={{ padding: "0 18px 40px" }}>

        {/* PICK MODE */}
        {mode === "pick" && (
          <div style={{ paddingTop: 24 }}>
            <h1 style={{ fontFamily: "'Space Mono', monospace", fontSize: 24, fontWeight: 700, margin: "0 0 12px", lineHeight: 1.2 }}>Quick vibes<br/>check</h1>
            <p style={{ fontSize: 14, lineHeight: 1.6, color: "#666", margin: "0 0 28px" }}>6 taps, 30 seconds. Tells us what everyone's up for tomorrow so we can pick a plan that works.</p>
            
            <button onClick={() => setMode("quiz")} style={{
              display: "block", width: "100%", background: "#1A1A1A", color: "#fff",
              fontFamily: "'Space Mono', monospace", fontSize: 14, fontWeight: 700,
              padding: "16px", border: "none", borderRadius: 8, cursor: "pointer", marginBottom: 12,
            }}>TAKE THE QUIZ →</button>
            
            <button onClick={() => setMode("decode")} style={{
              display: "block", width: "100%", background: "#F0EDE8", color: "#555",
              fontFamily: "'Space Mono', monospace", fontSize: 12, fontWeight: 700,
              padding: "14px", border: "none", borderRadius: 8, cursor: "pointer",
            }}>I HAVE EVERYONE'S CODES →</button>
          </div>
        )}

        {/* QUIZ */}
        {mode === "quiz" && (
          <div style={{ paddingTop: 20 }}>
            <div style={{ display: "flex", gap: 4, marginBottom: 20 }}>
              {QS.map((_, i) => (
                <div key={i} style={{
                  flex: 1, height: 4, borderRadius: 2,
                  background: i <= step ? "#1A1A1A" : "#E8E2D8",
                  transition: "background 0.2s",
                }} />
              ))}
            </div>
            
            <div style={{
              fontFamily: "'Space Mono', monospace", fontSize: 9, fontWeight: 700,
              letterSpacing: "0.08em", color: "#999", marginBottom: 6,
            }}>QUESTION {step + 1} OF {QS.length}</div>
            
            <h2 style={{
              fontFamily: "'Space Mono', monospace", fontSize: 18, fontWeight: 700,
              margin: "0 0 16px", lineHeight: 1.3,
            }}>{QS[step].q}</h2>
            
            {QS[step].opts.map(opt => {
              const selected = answers[QS[step].id] === opt.val;
              return (
                <button key={opt.val} onClick={() => handleAnswer(opt.val)} style={{
                  display: "block", width: "100%", textAlign: "left",
                  background: selected ? "#1A1A1A" : "#fff",
                  color: selected ? "#fff" : "#1A1A1A",
                  border: "1.5px solid #E5E0D8", borderRadius: 8,
                  padding: "14px 16px", marginBottom: 8, cursor: "pointer",
                  fontSize: 14, fontWeight: 500, transition: "all 0.12s",
                  lineHeight: 1.4,
                }}>{opt.label}</button>
              );
            })}
          </div>
        )}

        {/* RESULT */}
        {mode === "result" && (
          <div style={{ paddingTop: 24, textAlign: "center" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>✓</div>
            <h2 style={{ fontFamily: "'Space Mono', monospace", fontSize: 20, fontWeight: 700, margin: "0 0 8px" }}>Done!</h2>
            <p style={{ fontSize: 14, color: "#666", margin: "0 0 24px" }}>Send this code back:</p>
            
            <div style={{
              background: "#1A1A1A", color: "#fff", borderRadius: 10,
              padding: "20px", marginBottom: 16,
            }}>
              <div style={{
                fontFamily: "'Space Mono', monospace", fontSize: 32, fontWeight: 700,
                letterSpacing: "0.15em",
              }}>{myCode}</div>
            </div>
            
            <button onClick={() => {
              if (navigator.share) {
                navigator.share({ text: `My Amsterdam vibes code: ${myCode}` });
              } else {
                navigator.clipboard?.writeText(myCode);
              }
            }} style={{
              display: "block", width: "100%", background: "#2563EB", color: "#fff",
              fontFamily: "'Space Mono', monospace", fontSize: 13, fontWeight: 700,
              padding: "14px", border: "none", borderRadius: 8, cursor: "pointer", marginBottom: 8,
            }}>SHARE / COPY CODE</button>
            
            <button onClick={() => { setMode("pick"); setStep(0); setAnswers({}); }} style={{
              display: "block", width: "100%", background: "#F0EDE8", color: "#555",
              fontFamily: "'Space Mono', monospace", fontSize: 11, fontWeight: 700,
              padding: "12px", border: "none", borderRadius: 8, cursor: "pointer",
            }}>START OVER (NEXT PERSON)</button>
          </div>
        )}

        {/* DECODE */}
        {mode === "decode" && (
          <div style={{ paddingTop: 20 }}>
            <h2 style={{ fontFamily: "'Space Mono', monospace", fontSize: 18, fontWeight: 700, margin: "0 0 6px" }}>Enter everyone's codes</h2>
            <p style={{ fontSize: 13, color: "#888", margin: "0 0 16px" }}>Paste the 6-letter codes you got back.</p>
            
            {[0,1,2,3].map(i => (
              <div key={i} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input value={names[i]} onChange={e => { const n = [...names]; n[i] = e.target.value; setNames(n); }}
                    style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, border: "none", background: "transparent", color: "#555", width: 90, padding: "4px 0" }} />
                  <input value={codes[i]} onChange={e => { const c = [...codes]; c[i] = e.target.value.toUpperCase().slice(0,6); setCodes(c); }}
                    placeholder="ABCDEF" maxLength={6}
                    style={{
                      fontFamily: "'Space Mono', monospace", fontSize: 16, fontWeight: 700,
                      letterSpacing: "0.12em", padding: "10px 14px", border: "1.5px solid #E5E0D8",
                      borderRadius: 6, flex: 1, textAlign: "center", background: codes[i].length === 6 ? "#F0FFF0" : "#fff",
                    }} />
                </div>
              </div>
            ))}

            {decoded.length >= 2 && (
              <div style={{ marginTop: 24 }}>
                <h3 style={{ fontFamily: "'Space Mono', monospace", fontSize: 14, fontWeight: 700, margin: "0 0 14px" }}>THE OVERLAP</h3>
                
                {QS.map(q => {
                  const votes = {};
                  decoded.forEach((d, i) => {
                    if (d[q.id]) {
                      if (!votes[d[q.id]]) votes[d[q.id]] = [];
                      votes[d[q.id]].push(names[codes.findIndex((c,ci) => decode(c)[q.id] === d[q.id] && ci === [0,1,2,3].filter(j => codes[j].length === 6)[i])]);
                    }
                  });
                  
                  const allVals = decoded.map(d => d[q.id]).filter(Boolean);
                  const counts = {};
                  allVals.forEach(v => { counts[v] = (counts[v] || 0) + 1; });
                  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
                  const total = decoded.length;
                  const unanimous = sorted.length === 1;
                  
                  return (
                    <div key={q.id} style={{
                      background: "#fff", border: "1px solid #E8E2D8", borderRadius: 8,
                      padding: "12px 14px", marginBottom: 8,
                    }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: "#999", marginBottom: 6 }}>
                        {q.q.replace("?", "")}
                      </div>
                      {sorted.map(([val, count]) => (
                        <div key={val} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                          <div style={{
                            height: 6, borderRadius: 3, transition: "width 0.3s",
                            width: `${(count / total) * 100}%`, minWidth: 20,
                            background: unanimous ? "#2D6A4F" : count === Math.max(...Object.values(counts)) ? "#2563EB" : "#E8E2D8",
                          }} />
                          <span style={{ fontSize: 12, fontWeight: 600, color: "#444", whiteSpace: "nowrap" }}>
                            {LABELS[q.id]?.[val] || val}
                          </span>
                          <span style={{ fontSize: 11, color: "#aaa" }}>({count})</span>
                        </div>
                      ))}
                    </div>
                  );
                })}

                {/* Summary */}
                <div style={{
                  background: "#1A1A1A", color: "#fff", borderRadius: 10,
                  padding: "16px 18px", marginTop: 16,
                }}>
                  <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, fontWeight: 700, letterSpacing: "0.06em", opacity: 0.5, marginBottom: 8 }}>QUICK READ</div>
                  <p style={{ fontSize: 13, lineHeight: 1.6, margin: 0 }}>
                    {(() => {
                      const vibeVotes = decoded.map(d => d.vibe).filter(Boolean);
                      const vibeCounts = {};
                      vibeVotes.forEach(v => { vibeCounts[v] = (vibeCounts[v] || 0) + 1; });
                      const topVibe = Object.entries(vibeCounts).sort((a,b) => b[1] - a[1])[0];
                      
                      const vegCount = decoded.filter(d => d.veggie === "veg" || d.veggie === "flexveg").length;
                      const sitCount = decoded.filter(d => d.food === "sit").length;
                      const indoorCount = decoded.filter(d => d.weather === "indoor").length;
                      
                      let summary = "";
                      if (topVibe) summary += `${topVibe[1]} of ${decoded.length} want ${LABELS.vibe[topVibe[0]]}. `;
                      if (vegCount > 0) summary += `${vegCount} need veggie options. `;
                      if (sitCount > decoded.length / 2) summary += `Most want a proper sit-down lunch. `;
                      if (indoorCount > decoded.length / 2) summary += `Most want to be indoors. `;
                      return summary || "Mixed preferences — you'll need to make the call!";
                    })()}
                  </p>
                </div>
              </div>
            )}
            
            <button onClick={() => setMode("pick")} style={{
              display: "block", width: "100%", background: "#F0EDE8", color: "#555",
              fontFamily: "'Space Mono', monospace", fontSize: 11, fontWeight: 700,
              padding: "12px", border: "none", borderRadius: 8, cursor: "pointer", marginTop: 16,
            }}>← BACK</button>
          </div>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Quiz />);
</script>
</body>
</html>
