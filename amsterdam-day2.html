  {id:"niemeijer",n:"Gebroeders Niemeijer",v:"Best croissants in Amsterdam",d:"Kiazim says these are some of the best croissants she's had — super crisp and buttery. On Nieuwendijk, south from Centraal. Perfect grab-and-go before the ferry or NEMO.",addr:"Nieuwendijk 35",near:"Centraal → Noord / NEMO",p:"€5–10",ord:"A croissant. Maybe two.",src:"Kiazim/Guardian",veg:1,lat:52.3771,lng:4.8953},

/* ── UI ── */
const TC={do:{l:"DO THIS",bg:"#000",fg:"#fff"},walk:{l:"EXPLORE",bg:"#E4E0D8",fg:"#555"},eat:{l:"EAT",bg:"#FEF3C7",fg:"#92400E"},shop:{l:"SHOP",bg:"#DBEAFE",fg:"#1E40AF"},lunch:{l:"LUNCH",bg:"#D1FAE5",fg:"#065F46"},info:{l:"NOTE",bg:"#FEE2E2",fg:"#991B1B"}};

function C({p,col,ex,onT}){
  const tc=TC[p.t||"eat"]||TC.eat;
  if(p.closed&&!ex) return <div key={p.n} style={{opacity:0.4,background:"#fff",border:"1px solid #E8E2D8",borderRadius:10,marginBottom:7,padding:"11px 13px"}}>
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,fontWeight:700,background:"#FEE2E2",color:"#991B1B",padding:"2px 6px",borderRadius:3}}>CLOSED WED</span>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,textDecoration:"line-through"}}>{p.n}</span>
    </div>
  </div>;
  return <div style={{background:"#fff",border:ex?`2px solid ${col}`:"1px solid #E8E2D8",borderRadius:10,marginBottom:7,overflow:"hidden",transition:"all 0.15s"}}>
    <button onClick={onT} style={{display:"block",width:"100%",textAlign:"left",background:"none",border:"none",cursor:"pointer",padding:"11px 13px 9px"}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:6}}>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,fontWeight:700,letterSpacing:"0.03em",background:tc.bg,color:tc.fg,padding:"2px 6px",borderRadius:3,flexShrink:0,marginTop:3}}>{tc.l}</span>
        <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:4}}>
          <h3 style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12.5,fontWeight:700,margin:0}}>{p.n}</h3>
          {p.veg?<span style={{fontSize:10}}>🌱</span>:null}
        </div></div>
        <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
          {p.p&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#aaa"}}>{p.p}</span>}
          <span style={{fontSize:11,color:"#ccc",transform:ex?"rotate(180deg)":"none",transition:"transform 0.15s",display:"inline-block"}}>▾</span>
        </div>
      </div>
    </button>
    {ex&&<div style={{padding:"0 13px 11px",borderTop:"1px solid #F0EDE8"}}>
      <p style={{fontSize:12,lineHeight:1.6,color:"#444",margin:"8px 0 0"}}>{p.d}</p>
      {p.ord&&<div style={{marginTop:7,padding:"5px 9px",background:p.t==="shop"?"#EFF6FF":"#FFFBEB",borderRadius:5,borderLeft:`3px solid ${col}`}}>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8.5,fontWeight:700,color:col}}>{p.t==="shop"?"LOOK FOR":"ORDER"} → </span>
        <span style={{fontSize:12,color:"#555"}}>{p.ord}</span>
      </div>}
      <div style={{display:"flex",gap:4,marginTop:6,flexWrap:"wrap"}}>
        {p.time&&<span style={ts}>⏱ {p.time}</span>}
        {p.addr&&<span style={ts}>📍 {p.addr}</span>}
        {p.src&&<span style={{...ts,background:"#F3EFF8",color:"#7B5EA7"}}>via {p.src}</span>}
      </div>
      {p.link&&<a href={p.link} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",marginTop:6,fontSize:11,fontWeight:600,color:col,textDecoration:"none",borderBottom:`1px solid ${col}33`}}>Website →</a>}
    </div>}
  </div>;
}
const ts={fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,fontWeight:500,color:"#888",background:"#F5F3EE",padding:"2px 6px",borderRadius:8};

function buildMap(pts){
  const g=pts.filter(p=>p.lat&&p.lng);
  if(g.length<2) return null;
  const o=`${g[0].lat},${g[0].lng}`;
  const d=`${g[g.length-1].lat},${g[g.length-1].lng}`;
  const w=g.slice(1,-1).map(p=>`${p.lat},${p.lng}`).join("|");
  return `https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${d}&waypoints=${w}&travelmode=transit`;
}

function App(){
  const[step,setStep]=useState("start");
  const[bk,setBk]=useState(null);
  const[zone,setZone]=useState(null);
  const[ex,setEx]=useState(null);
  const[saved,setSaved]=useState([]);
  const z=ZONES.find(x=>x.id===zone);
  const col=z?.c1||"#000";
  const tog=id=>setEx(ex===id?null:id);
  const save=p=>{const k=p.n;setSaved(s=>s.find(x=>x.n===k)?s.filter(x=>x.n!==k):[...s,p]);};
  const isSaved=p=>saved.find(x=>x.n===p.n);
  const url=buildMap(saved);

  return <div style={{fontFamily:"'DM Sans',sans-serif",background:"#FAFAF7",minHeight:"100vh",color:"#1A1A1A",maxWidth:480,margin:"0 auto"}}>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

    {/* HEADER */}
    <div style={{position:"sticky",top:0,zIndex:100,background:"linear-gradient(135deg,#1A1A1A 0%,#2D2D2D 100%)",color:"#fff",padding:"11px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:"0.08em",color:"#E8512F"}}>WED 12 MAR · 🌧 · EUROSTAR 18:25</div>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,marginTop:1}}>AMSTERDAM DAY 2</div>
      </div>
      <div style={{display:"flex",gap:5,alignItems:"center"}}>
        {saved.length>0&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"#E8512F",fontWeight:700,background:"rgba(232,81,47,0.15)",padding:"2px 7px",borderRadius:10}}>{saved.length} ♡</span>}
        {step!=="start"&&<button onClick={()=>{
          if(step==="wild"){setStep("detail");setEx(null);}
          else if(step==="detail"){setStep("zone");setZone(null);setEx(null);}
          else if(step==="zone"){setStep("bk");setBk(null);}
          else if(step==="bk") setStep("start");
        }} style={{background:"rgba(255,255,255,0.08)",border:"none",color:"#fff",fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,padding:"4px 9px",borderRadius:4,cursor:"pointer"}}>←</button>}
      </div>
    </div>

    <div style={{padding:"0 16px 40px"}}>

    {/* START */}
    {step==="start"&&<>
      <div style={{padding:"28px 0 20px"}}>
        <div style={{display:"inline-block",background:"#E8512F",color:"#fff",fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:700,letterSpacing:"0.06em",padding:"3px 10px",borderRadius:4,marginBottom:12}}>4 OF YOU · 2 VEGGIE · BACK BY 4PM</div>
        <h1 style={{fontFamily:"'JetBrains Mono',monospace",fontSize:28,fontWeight:700,margin:0,lineHeight:1.15,background:"linear-gradient(135deg,#1A1A1A,#444)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Three<br/>choices.</h1>
        <p style={{fontSize:13.5,lineHeight:1.6,color:"#666",margin:"14px 0 0"}}>Breakfast → the big thing → everything else unfolds. Tap ♡ to save places and build a Google Maps route at the end.</p>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:18}}>
        {[["①","Breakfast","#E8512F"],["②","Big Thing","#1D6FE0"],["③","Eat + Shop","#1B7A4A"]].map(([n,l,c],i)=>(
          <div key={i} style={{flex:1,background:c,color:"#fff",padding:"10px 4px",borderRadius:8,textAlign:"center"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700}}>{n}</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,fontWeight:600,marginTop:1,opacity:0.7}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{background:"#F0EDE6",borderRadius:8,padding:"11px 13px",marginBottom:10,fontSize:12,lineHeight:1.5,color:"#555"}}>
        <strong>🌱 Veggie:</strong> Places with 🌱 have proper vegetarian options throughout.
      </div>
      <div style={{background:"#F0EDE6",borderRadius:8,padding:"11px 13px",marginBottom:10,fontSize:12,lineHeight:1.5,color:"#555"}}>
        <strong>🛍 Near hotel:</strong> Afura (Vijzelgracht 13, 11am–7pm), Holtkamp patisserie (Vijzelgracht 15), American Vintage (Van Baerlestraat 18). All walkable before you head out.
      </div>
      <div style={{background:"#F0EDE6",borderRadius:8,padding:"11px 13px",marginBottom:16,fontSize:12,lineHeight:1.5,color:"#555"}}>
        <strong>🕐 Timing:</strong> Hotel ~4pm → tram to Centraal (15 min) → Eurostar check-in 5:25pm → departs 6:25pm. Comfortable.
      </div>
      <button onClick={()=>setStep("bk")} style={{display:"block",width:"100%",background:"linear-gradient(135deg,#1A1A1A,#333)",color:"#fff",fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,padding:"15px",border:"none",borderRadius:8,cursor:"pointer"}}>LET'S GO →</button>
    </>}

    {/* BREAKFAST */}
    {step==="bk"&&<>
      <div style={{padding:"16px 0 10px"}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:700,letterSpacing:"0.08em",color:"#E8512F"}}>① BREAKFAST</div>
        <h2 style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700,margin:"3px 0 0"}}>Where first</h2>
        <p style={{fontSize:12,lineHeight:1.5,color:"#888",margin:"5px 0 0"}}>All have 🌱 options. "Near" shows which direction each pulls you.</p>
      </div>
      {BK.map(b=>(
        <div key={b.id} onClick={()=>setBk(b.id)} style={{background:bk===b.id?"linear-gradient(135deg,#1A1A1A,#2D2D2D)":"#fff",color:bk===b.id?"#fff":"#1A1A1A",border:bk===b.id?"1px solid #333":"1px solid #E5E0D8",borderRadius:9,marginBottom:7,padding:"11px 13px",cursor:"pointer",transition:"all 0.12s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div><h3 style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12.5,fontWeight:700,margin:0}}>{b.n} 🌱</h3>
            <p style={{fontSize:11.5,margin:"2px 0 0",color:bk===b.id?"rgba(255,255,255,0.5)":"#999",fontStyle:"italic"}}>{b.v}</p></div>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:bk===b.id?"rgba(255,255,255,0.3)":"#bbb"}}>{b.p}</span>
          </div>
          <p style={{fontSize:11.5,lineHeight:1.5,margin:"5px 0 0",color:bk===b.id?"rgba(255,255,255,0.75)":"#666"}}>{b.d}</p>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
            <span style={{fontSize:10.5,color:"#E8512F",fontWeight:600}}>→ {b.near}</span>
            <span style={{fontSize:10,color:bk===b.id?"rgba(255,255,255,0.4)":"#bbb"}}>{b.src}</span>
          </div>
        </div>
      ))}
      {bk&&<button onClick={()=>{setStep("zone");const sel=BK.find(b=>b.id===bk);if(sel)save({n:sel.n,lat:sel.lat,lng:sel.lng});}} style={{display:"block",width:"100%",background:"linear-gradient(135deg,#1A1A1A,#333)",color:"#fff",fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,padding:"14px",border:"none",borderRadius:8,cursor:"pointer",marginTop:10}}>NEXT → THE BIG THING</button>}
    </>}

    {/* ZONE PICK */}
    {step==="zone"&&<>
      <div style={{padding:"16px 0 10px"}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:700,letterSpacing:"0.08em",color:"#1D6FE0"}}>② THE BIG THING</div>
        <h2 style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700,margin:"3px 0 0"}}>Pick your zone</h2>
        <p style={{fontSize:12,lineHeight:1.5,color:"#888",margin:"5px 0 0"}}>Each has its own orbit of food, shops, walks. Includes en-route shopping.</p>
      </div>
      {ZONES.map(r=>(
        <button key={r.id} onClick={()=>{setZone(r.id);setStep("detail");}} style={{display:"block",width:"100%",textAlign:"left",background:"#fff",border:`2px solid ${r.c1}`,borderRadius:10,padding:0,marginBottom:10,cursor:"pointer",overflow:"hidden"}}>
          <div style={{background:`linear-gradient(135deg,${r.c1},${r.c1}dd)`,padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:17}}>{r.em}</span><span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13.5,fontWeight:700,color:"#fff"}}>{r.n}</span></div>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.6)",background:"rgba(255,255,255,0.15)",padding:"2px 7px",borderRadius:10}}>{r.t}</span>
          </div>
          <div style={{padding:"10px 14px 12px",background:`linear-gradient(180deg,${r.c2},#fff)`}}>
            <p style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,fontWeight:700,color:r.c1,margin:"0 0 4px"}}>{r.hl}</p>
            <p style={{fontSize:12,lineHeight:1.5,color:"#666",margin:"0 0 7px"}}>{r.desc.slice(0,140)}...</p>
            <div style={{fontSize:10.5,color:"#888",fontStyle:"italic"}}>Best for: {r.best}</div>
          </div>
        </button>
      ))}
    </>}

    {/* ZONE DETAIL */}
    {step==="detail"&&z&&<>
      <div style={{margin:"0 -16px",background:`linear-gradient(135deg,${z.c1},${z.c1}cc)`,padding:"16px 16px 14px",color:"#fff"}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}><span style={{fontSize:20}}>{z.em}</span><h2 style={{fontFamily:"'JetBrains Mono',monospace",fontSize:17,fontWeight:700,margin:0}}>{z.n}</h2></div>
        <p style={{fontSize:12,lineHeight:1.55,margin:0,color:"rgba(255,255,255,0.85)"}}>{z.desc}</p>
      </div>
      <div style={{margin:"0 -16px",padding:"8px 16px",background:z.c2,borderBottom:"1px solid #E8E2D8"}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,fontWeight:700,letterSpacing:"0.06em",color:z.c1}}>🚋 THERE</div>
        <p style={{fontSize:11,lineHeight:1.4,color:"#555",margin:"2px 0 0"}}>{z.how}</p>
      </div>
      <div style={{margin:"0 -16px",padding:"6px 16px",background:"#FFFDF5",borderBottom:"1px solid #E8E2D8",marginBottom:12}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,fontWeight:700,letterSpacing:"0.06em",color:"#999"}}>🕐 BACK</div>
        <p style={{fontSize:10.5,lineHeight:1.4,color:"#888",margin:"2px 0 0"}}>{z.back}</p>
      </div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8.5,fontWeight:700,letterSpacing:"0.06em",color:"#999",marginBottom:7}}>IN THIS ORBIT · tap ♡ to save</div>
      {z.stops.map((s,i)=><div key={i} style={{position:"relative"}}>
        <C p={s} col={col} ex={ex===`s${i}`} onT={()=>tog(`s${i}`)}/>
        {!s.closed&&<button onClick={e=>{e.stopPropagation();save(s);}} style={{position:"absolute",top:9,right:9,background:"none",border:"none",cursor:"pointer",fontSize:14,padding:1,opacity:0.7}}>{isSaved(s)?"❤️":"🤍"}</button>}
      </div>)}
      <button onClick={()=>{setStep("wild");setEx(null);}} style={{display:"block",width:"100%",background:"linear-gradient(135deg,#1A1A1A,#333)",color:"#fff",fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,padding:"13px",border:"none",borderRadius:8,cursor:"pointer",marginTop:10}}>MORE LUNCH + SNACKS →</button>
    </>}

    {/* WILDCARDS */}
    {step==="wild"&&<>
      <div style={{padding:"14px 0 10px"}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:700,letterSpacing:"0.06em",color:"#1B7A4A"}}>③ ANYWHERE</div>
        <h2 style={{fontFamily:"'JetBrains Mono',monospace",fontSize:17,fontWeight:700,margin:"3px 0 0"}}>Lunch & snacks</h2>
        <p style={{fontSize:12,lineHeight:1.5,color:"#888",margin:"5px 0 0"}}>Work with any zone. Tap ♡ to add to your route.</p>
      </div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8.5,fontWeight:700,letterSpacing:"0.05em",color:"#1B7A4A",marginBottom:6}}>LATE LUNCH — SIT DOWN</div>
      {LUNCH.map(l=><div key={l.id} style={{position:"relative"}}><C p={{...l,t:"lunch"}} col="#1B7A4A" ex={ex===l.id} onT={()=>tog(l.id)}/><button onClick={()=>save(l)} style={{position:"absolute",top:9,right:9,background:"none",border:"none",cursor:"pointer",fontSize:14,padding:1,opacity:0.7}}>{isSaved(l)?"❤️":"🤍"}</button></div>)}
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8.5,fontWeight:700,letterSpacing:"0.05em",color:"#B45309",marginTop:14,marginBottom:6}}>SNACKS + SHOPS — ONE THING, KEEP MOVING</div>
      {SNACKS.map(s=><div key={s.id} style={{position:"relative"}}><C p={{...s,t:s.t||"eat"}} col="#B45309" ex={ex===s.id} onT={()=>tog(s.id)}/><button onClick={()=>save(s)} style={{position:"absolute",top:9,right:9,background:"none",border:"none",cursor:"pointer",fontSize:14,padding:1,opacity:0.7}}>{isSaved(s)?"❤️":"🤍"}</button></div>)}

      {/* SAVED BAR */}
      {saved.length>0&&<div style={{position:"sticky",bottom:0,background:"linear-gradient(135deg,#1A1A1A,#2D2D2D)",margin:"14px -16px 0",padding:"12px 16px",borderRadius:"10px 10px 0 0"}}>
        <div style={{color:"#fff",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,marginBottom:5}}>{saved.length} PLACES SAVED</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:8}}>
          {saved.map((s,i)=><span key={i} style={{fontSize:9,color:"rgba(255,255,255,0.6)",background:"rgba(255,255,255,0.08)",padding:"2px 6px",borderRadius:8}}>{s.n}</span>)}
        </div>
        {url?<a href={url} target="_blank" rel="noopener noreferrer" style={{display:"block",width:"100%",background:"linear-gradient(135deg,#1D6FE0,#3B82F6)",color:"#fff",fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,padding:"11px",borderRadius:8,textAlign:"center",textDecoration:"none"}}>OPEN ROUTE IN GOOGLE MAPS →</a>
        :<p style={{fontSize:10,color:"rgba(255,255,255,0.4)",margin:0}}>Save 2+ places with locations for a route</p>}
      </div>}

      <button onClick={()=>{setStep("detail");setEx(null);}} style={{display:"block",width:"100%",background:"#F0EDE6",color:"#555",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,padding:"11px",border:"none",borderRadius:8,cursor:"pointer",marginTop:saved.length>0?70:14}}>← BACK TO {z?.n?.toUpperCase()}</button>
    </>}

    </div>
  </div>;
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
